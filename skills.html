<!doctype html>
<html lang="zh-CN">
<head>

  <title>Codex 本地技能目录</title>
  <style>
    :root {
      --bg: #f7f8f6;
      --surface: #ffffff;
      --line: #dae4e1;
      --text: #17201f;
      --muted: #60706d;
      --teal: #08756f;
      --shadow: 0 14px 34px rgba(19, 44, 40, 0.08);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "Microsoft YaHei", sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--text);
      line-height: 1.56;
      background: linear-gradient(180deg, rgba(8, 117, 111, 0.05), transparent 340px), var(--bg);
    }
    a { color: inherit; }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      border-bottom: 1px solid var(--line);
      background: rgba(247, 248, 246, 0.94);
      backdrop-filter: blur(12px);
    }
    .nav {
      max-width: 1280px;
      margin: 0 auto;
      padding: 13px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 780;
      text-decoration: none;
      color: var(--text);
      letter-spacing: 0;
    }
    .mark {
      width: 32px;
      height: 32px;
      border: 2px solid var(--text);
      border-radius: 7px;
      display: grid;
      place-items: center;
      background: #fff;
      font-size: 14px;
    }
    .navlinks {
      display: flex;
      gap: 18px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 650;
      white-space: nowrap;
    }
    .navlinks a {
      text-decoration: none;
      color: inherit;
    }
    .navlinks a:hover {
      color: var(--teal);
    }
    main {
      max-width: 1280px;
      margin: 0 auto;
      padding: 42px 24px 60px;
    }
    h1 {
      margin: 0 0 16px;
      max-width: 860px;
      font-size: clamp(34px, 4.8vw, 58px);
      letter-spacing: 0;
      line-height: 0.98;
    }
    .lead {
      margin: 0;
      max-width: 940px;
      color: #40514d;
      font-size: 18px;
    }
    .hero-panel, .note, .skill-card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
    }
    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1.15fr) minmax(340px, 0.85fr);
      gap: 30px;
      align-items: end;
      margin-bottom: 22px;
    }
    .hero-panel {
      padding: 16px 18px;
      box-shadow: var(--shadow);
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }
    .stat {
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfb;
    }
    .stat strong {
      display: block;
      color: var(--teal);
      font-size: 30px;
      line-height: 1.08;
    }
    .stat span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 650;
    }
    .toolbar {
      display: grid;
      grid-template-columns: 1fr minmax(220px, 280px) minmax(150px, 200px);
      gap: 12px;
      margin-bottom: 18px;
      align-items: start;
    }
    .search {
      position: relative;
    }
    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
    .search input,
    .search select,
    .toolbar select {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: var(--surface);
      color: var(--text);
      padding: 0 12px;
      font: inherit;
      font-size: 14px;
      outline: none;
    }
    .search input {
      padding-left: 38px;
    }
    .search input:focus,
    .toolbar select:focus {
      border-color: rgba(8, 117, 111, 0.55);
      box-shadow: 0 0 0 3px rgba(8, 117, 111, 0.12);
    }
    .search::before {
      content: "🔍";
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      color: var(--muted);
      font-size: 14px;
    }
    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 14px;
    }
    .section-head h2 {
      margin: 0;
      font-size: 20px;
      letter-spacing: 0;
    }
    .section-head p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }
    .cards {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 13px;
    }
    .skill-card {
      padding: 15px 16px;
      min-height: 190px;
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      gap: 8px;
    }
    .skill-card h3 {
      margin: 0;
      font-size: 17px;
      line-height: 1.2;
      letter-spacing: 0;
    }
    .skill-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 2px;
    }
    .badge {
      border: 1px solid #e4ebe8;
      border-radius: 7px;
      background: #f8faf9;
      color: #4c5d59;
      padding: 4px 8px;
      font-size: 12px;
      font-weight: 650;
      white-space: nowrap;
    }
    .tag {
      border: 1px solid rgba(8, 117, 111, 0.25);
      color: #075f5a;
      background: rgba(8, 117, 111, 0.08);
      border-radius: 7px;
      padding: 4px 8px;
      font-size: 12px;
      font-weight: 760;
      white-space: nowrap;
    }
    .summary {
      margin: 2px 0 0;
      color: #3b4d49;
      font-size: 14px;
      line-height: 1.5;
      overflow-wrap: anywhere;
    }
    .field {
      display: grid;
      grid-template-columns: 56px 1fr;
      gap: 8px;
      padding-top: 8px;
      border-top: 1px solid #edf1ef;
      color: #40514d;
      font-size: 12px;
    }
    .field b {
      color: var(--text);
      font-weight: 760;
    }
    .empty {
      display: none;
      padding: 30px;
      border: 1px dashed var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.75);
      color: var(--muted);
      text-align: center;
    }
    .note {
      margin-top: 26px;
      padding: 16px;
      color: var(--muted);
      font-size: 13px;
    }
    .note code {
      background: #f3f6f5;
      border: 1px solid var(--line);
      border-radius: 4px;
      padding: 1px 5px;
    }
    @media (max-width: 1120px) {
      .cards { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .hero, .toolbar { grid-template-columns: 1fr; }
    }
    @media (max-width: 720px) {
      .nav { flex-direction: column; align-items: flex-start; }
      .navlinks { width: 100%; overflow-x: auto; padding-bottom: 2px; }
      main { padding: 30px 16px 44px; }
      .cards, .stats { grid-template-columns: 1fr; }
      .toolbar { grid-template-columns: 1fr; }
      .section-head { flex-direction: column; align-items: flex-start; }
      .field { grid-template-columns: 1fr; gap: 2px; }
    }
  </style>

SDK for web embeds. Use for campaign or entry ID chat launch, event-driven controls, user context updates, and CSP-safe deployment.","sourcePath":"plugins/zoom/skills/virtual-agent/web/SKILL.md"},{"pluginName":"zotero","pluginDisplayName":"Zotero","pluginCategory":"教育与研究","pluginInstalled":false,"skillSlug":"zotero","skillName":"Zotero","description":"Use Zotero Desktop from Codex to enable/probe the local API, search a local Zotero library, list items/collections/tags, export BibTeX, insert citation keys into LaTeX or Markdown drafts, read indexed full text when requested, and import Bi","sourcePath":"plugins/zotero/skills/zotero/SKILL.md"}];
    const SKILLS_BY_PLUGIN = {"airtable":3,"atlassian-rovo":5,"base44":3,"boltz-api-cli":8,"box":1,"brighthire":1,"build-ios-apps":9,"build-macos-apps":11,"build-web-apps":6,"build-web-data-visualization":18,"canva":3,"catalyst-by-zoho":1,"chronograph-gp":1,"chronograph-lp":3,"circleci":4,"cloudflare":9,"coderabbit":1,"codex-security":10,"dnb-finance-analytics":1,"daloopa":21,"datasite":8,"deepnote":5,"digitalocean":1,"expo":13,"figma":11,"game-studio":9,"github":4,"gmail":2,"google-calendar":5,"google-drive":5,"hex":1,"heygen":2,"hubspot":4,"hugging-face":11,"hyperframes":5,"life-science-research":50,"ngs-analysis":18,"linear":1,"magicpath":1,"midpage":4,"minimal-plugin":1,"mixpanel-headless":4,"moody-s":9,"morningstar":3,"multi-skill-plugin":2,"neon-postgres":2,"netlify":12,"notion":4,"nvidia":11,"openai-ads-conversions":1,"openai-developers":5,"outlook-calendar":6,"outlook-email":6,"plugin-creator":1,"plugin-eval":5,"posthog":1,"remotion":1,"render":21,"replayio":2,"sentry":1,"sharepoint":7,"shopify":20,"slack":6,"stripe":2,"supabase":2,"superhuman":6,"superpowers":14,"teams":7,"temporal":1,"test-android-apps":2,"twilio-developer-kit":55,"vercel":47,"wix":4,"zoom":53,"zotero":1};
    const searchEl = document.querySelector("#skillsSearch");
    const pluginFilter = document.querySelector("#pluginFilter");
    const sortModeEl = document.querySelector("#sortMode");
    const cardsEl = document.querySelector("#skillsCards");
    const emptyEl = document.querySelector("#skillsEmpty");
    const resultCountEl = document.querySelector("#skillsResultCount");
    const resultTitleEl = document.querySelector("#skillsResultTitle");

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function normalize(value) {
      return String(value || "").trim().toLowerCase();
    }

    function slugDisplay(skill) {
      return escapeHtml(skill.skillSlug);
    }

    function skillCardTemplate(skill) {
      const status = skill.pluginInstalled ? "已安装缓存" : "未安装缓存";
      const pluginLabel = skill.pluginDisplayName || skill.pluginName;
      return `
        <article class="skill-card">
          <div>
            <h3>${escapeHtml(skill.skillName)}</h3>
            <div class="skill-meta">
              <span class="tag">${escapeHtml(pluginLabel)}</span>
              <span class="badge">所属插件: ${escapeHtml(skill.pluginName)}</span>
              <span class="badge">${slugDisplay(skill)}</span>
            </div>
            <p class="summary">${escapeHtml(skill.description)}</p>
          </div>
          <div class="field"><b>状态</b><span>${status}</span></div>
          <div class="field"><b>类别</b><span>${escapeHtml(skill.pluginCategory || "未注明")}</span></div>
          <div class="field"><b>来源</b><span><code>${escapeHtml(skill.sourcePath)}</code></span></div>
        </article>`;
    }

    function renderPluginOptions() {
      const options = Object.entries(SKILLS_BY_PLUGIN).sort((a, b) => {
        if (b[1] !== a[1]) return b[1] - a[1];
        return String(a[0]).localeCompare(String(b[0]), "zh-CN");
      });
      for (const [pluginName, count] of options) {
        const option = document.createElement("option");
        option.value = pluginName;
        option.textContent = `${pluginName}（${count}）`;
        pluginFilter.appendChild(option);
      }
    }

    function renderSkills() {
      const query = normalize(searchEl.value);
      const pluginValue = pluginFilter.value;
      const mode = sortModeEl.value;
      let rows = SKILLS.filter((skill) => {
        if (pluginValue !== "all" && skill.pluginName !== pluginValue) return false;
        if (!query) return true;
        const haystack = normalize([
          skill.skillName,
          skill.skillSlug,
          skill.pluginName,
          skill.pluginDisplayName,
          skill.description,
          skill.pluginCategory
        ].join(" "));
        return haystack.includes(query);
      });
      rows.sort((a, b) => {
        if (mode === "name") {
          const byName = a.skillName.localeCompare(b.skillName, "zh-CN");
          if (byName !== 0) return byName;
          return a.pluginDisplayName.localeCompare(b.pluginDisplayName, "zh-CN");
        }
        if (a.pluginDisplayName === b.pluginDisplayName) {
          return a.skillName.localeCompare(b.skillName, "zh-CN");
        }
        return a.pluginDisplayName.localeCompare(b.pluginDisplayName, "zh-CN");
      });
      cardsEl.innerHTML = rows.map(skillCardTemplate).join("");
      resultCountEl.textContent = `${rows.length} 条结果`;
      resultTitleEl.textContent = pluginValue === "all" ? "全部技能" : (pluginValue + " 技能");
      emptyEl.style.display = rows.length ? "none" : "block";
    }

    renderPluginOptions();
    renderSkills();

    searchEl.addEventListener("input", renderSkills);
    pluginFilter.addEventListener("change", renderSkills);
    sortModeEl.addEventListener("change", renderSkills);
  </script>
</body>
